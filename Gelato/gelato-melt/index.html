<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GELATO Melt</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #fff;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }
  svg text {
    font-family: Impact, 'Arial Black', sans-serif;
    font-size: min(18vw, 200px);
    font-weight: bold;
    fill: #000;
    text-anchor: middle;
    dominant-baseline: central;
    filter: url(#melt);
    cursor: pointer;
  }
</style>
</head>
<body>
<svg width="100%" height="100%" viewBox="0 0 1000 400" preserveAspectRatio="xMidYMid meet">
  <defs>
    <filter id="melt" x="-20%" y="-20%" width="140%" height="300%">
      <feTurbulence id="noise" type="fractalNoise" baseFrequency="0.015" numOctaves="3" result="noise"/>
      <feDisplacementMap id="displace" in="SourceGraphic" in2="noise" scale="0" xChannelSelector="R" yChannelSelector="G"/>
      <feGaussianBlur id="blur" in="displace" stdDeviation="0"/>
    </filter>
  </defs>
  <text id="gelatoText" x="500" y="200">GELATO</text>
</svg>
<script>
const text = document.getElementById('gelatoText');
const displace = document.getElementById('displace');
const blur = document.getElementById('blur');
const noise = document.getElementById('noise');

const MAX_SCALE = 80;
const MAX_BLUR = 3;
const MAX_FREQ = 0.04;
const SPEED = 0.8;

let progress = 0;
let melting = false;

function lerp(a, b, t) { return a + (b - a) * t; }

function animate() {
  if (melting) {
    progress = Math.min(progress + SPEED, 100);
  } else {
    progress = Math.max(progress - SPEED * 1.5, 0);
  }

  const t = progress / 100;
  const easeT = t * t * (3 - 2 * t);

  displace.setAttribute('scale', lerp(0, MAX_SCALE, easeT));
  blur.setAttribute('stdDeviation', lerp(0, MAX_BLUR, easeT));
  noise.setAttribute('baseFrequency', lerp(0.015, MAX_FREQ, easeT));

  const gravity = easeT * 60;
  text.setAttribute('transform', `translate(0, ${gravity})`);

  if (progress > 0 || melting) {
    requestAnimationFrame(animate);
  }
}

text.addEventListener('mouseenter', () => {
  melting = true;
  requestAnimationFrame(animate);
});

text.addEventListener('mouseleave', () => {
  melting = false;
});
</script>
</body>
</html>
