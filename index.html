<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Retro Portfolio</title>
<link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

html, body {
  width: 100vw;
  height: 100vh;
  overflow: hidden;
  font-family: 'VT323', 'Courier New', monospace;
  color: #d4c5a9;
  background: #6b1d2f;
  user-select: none;
}

#app {
  display: flex;
  flex-direction: column;
  width: 100vw;
  height: 100vh;
}

#main {
  display: flex;
  flex: 1;
  position: relative;
  overflow: hidden;
}

#canvas-bg {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: 0;
}

#bg-title {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  z-index: 0;
  font-size: clamp(36px, 6vw, 80px);
  font-weight: 900;
  font-family: 'VT323', 'Courier New', monospace;
  text-align: center;
  pointer-events: none;
  letter-spacing: 6px;
  text-transform: uppercase;
  color: #6b1d2f;
  -webkit-text-stroke: 2px #8b5e3c;
  text-shadow:
    3px 3px 0 #4a1525,
    -1px -1px 0 #7a9e7e,
    6px 6px 0 rgba(74, 21, 37, 0.6);
}

/* Sidebar */
#sidebar {
  width: 200px;
  flex-shrink: 0;
  background: #4a2a1e;
  border-right: 3px solid #8b5e3c;
  padding: 16px 8px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  position: relative;
  z-index: 1;
  box-shadow: inset -2px 0 8px rgba(0,0,0,0.3);
}

.sidebar-title {
  text-align: center;
  font-size: 18px;
  color: #d4c5a9;
  padding-bottom: 12px;
  border-bottom: 2px solid #8b5e3c;
  margin-bottom: 8px;
  text-transform: uppercase;
  letter-spacing: 2px;
}

.sidebar-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 12px;
  background: #5c3828;
  border: 2px solid #7a4e3a;
  color: #d4c5a9;
  font-size: 18px;
  cursor: pointer;
  transition: background 0.15s;
  font-family: inherit;
  image-rendering: pixelated;
  box-shadow: 2px 2px 0 #3a1e12, inset 1px 1px 0 #7a5a4a;
}

.sidebar-item:hover {
  background: #7a4e3a;
  border-color: #d4c5a9;
}

.sidebar-item:active {
  box-shadow: inset 2px 2px 0 #3a1e12;
  transform: translate(1px, 1px);
}

.sidebar-item .icon {
  width: 24px;
  height: 24px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  background: #6b1d2f;
  border: 1px solid #8b5e3c;
  box-shadow: inset -1px -1px 0 #3a1e12;
}

/* Desktop area */
#desktop {
  flex: 1;
  position: relative;
  z-index: 1;
}

/* Taskbar */
#taskbar {
  height: 40px;
  flex-shrink: 0;
  background: #4a2a1e;
  border-top: 3px solid #8b5e3c;
  display: flex;
  align-items: center;
  padding: 0 12px;
  position: relative;
  z-index: 100;
  box-shadow: inset 0 2px 4px rgba(0,0,0,0.3);
}

#marquee-wrap {
  flex: 1;
  overflow: hidden;
  white-space: nowrap;
  font-size: 16px;
  color: #7a9e7e;
}

#marquee-text {
  display: inline-block;
  animation: scrollMarquee 20s linear infinite;
}

@keyframes scrollMarquee {
  from { transform: translateX(100%); }
  to { transform: translateX(-100%); }
}

#clocks {
  display: flex;
  gap: 16px;
  font-size: 16px;
  color: #d4c5a9;
  margin-left: 16px;
  flex-shrink: 0;
}

.clock {
  display: flex;
  align-items: center;
  gap: 4px;
}

/* CRT overlay */
#crt-overlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100vw;
  height: 100vh;
  z-index: 9999;
  pointer-events: none;
  display: none;
}

#crt-overlay.on {
  display: block;
}

#crt-overlay::after {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(0, 0, 0, 0.08) 2px,
    rgba(0, 0, 0, 0.08) 4px
  );
  animation: scanlineMove 0.1s linear infinite;
}

@keyframes scanlineMove {
  from { transform: translateY(0); }
  to { transform: translateY(4px); }
}

#crt-overlay::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: radial-gradient(
    ellipse at center,
    transparent 60%,
    rgba(0, 0, 0, 0.5) 100%
  );
  animation: crtFlicker 4s infinite;
}

@keyframes crtFlicker {
  0%, 100% { opacity: 1; }
  3% { opacity: 0.97; }
  6% { opacity: 1; }
  42% { opacity: 0.98; }
  44% { opacity: 1; }
  76% { opacity: 0.96; }
  78% { opacity: 1; }
  92% { opacity: 0.97; }
  94% { opacity: 1; }
}

/* CRT toggle button */
#crt-toggle {
  display: flex;
  align-items: center;
  gap: 4px;
  padding: 2px 8px;
  background: #5c3828;
  border: 2px solid #7a4e3a;
  color: #d4c5a9;
  font-family: inherit;
  font-size: 12px;
  cursor: pointer;
  margin-left: 8px;
  flex-shrink: 0;
  box-shadow: inset -1px -1px 0 #3a1e12;
  line-height: 1;
}

#crt-toggle:hover {
  background: #7a4e3a;
}

#crt-toggle:active {
  box-shadow: inset 1px 1px 0 #3a1e12;
}

#crt-toggle.active {
  background: #7a9e7e;
  border-color: #5c7a5e;
}

/* Taskbar tabs for minimized windows */
#taskbar-tabs {
  display: flex;
  align-items: center;
  gap: 4px;
  flex-shrink: 0;
  margin-right: 8px;
}

.taskbar-tab {
  display: flex;
  align-items: center;
  gap: 4px;
  padding: 2px 8px;
  background: #5c3828;
  border: 2px solid #7a4e3a;
  color: #d4c5a9;
  font-size: 12px;
  cursor: pointer;
  font-family: inherit;
  box-shadow: inset -1px -1px 0 #3a1e12;
  flex-shrink: 0;
  line-height: 1;
}

.taskbar-tab:hover {
  background: #7a4e3a;
}

.taskbar-tab:active {
  box-shadow: inset 1px 1px 0 #3a1e12;
}

.taskbar-tab .tab-close {
  margin-left: 4px;
  font-size: 10px;
  cursor: pointer;
  color: #d4c5a9;
}

.taskbar-tab .tab-close:hover {
  color: #ff6b6b;
}

/* Hourglass overlay */
#hourglass-overlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100vw;
  height: 100vh;
  z-index: 10000;
  display: none;
  align-items: center;
  justify-content: center;
  background: rgba(0, 0, 0, 0.6);
  pointer-events: none;
}

#hourglass-overlay.on {
  display: flex;
}

.hourglass-box {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 16px;
}

.hourglass {
  position: relative;
  width: 50px;
  height: 90px;
}

.hg-top {
  width: 0;
  height: 0;
  border-left: 25px solid transparent;
  border-right: 25px solid transparent;
  border-bottom: 35px solid #d4c5a9;
}

.hg-bottom {
  width: 0;
  height: 0;
  border-left: 25px solid transparent;
  border-right: 25px solid transparent;
  border-top: 35px solid #d4c5a9;
  margin-top: -1px;
}

.hg-sand-stream {
  position: absolute;
  top: 35px;
  left: 50%;
  width: 4px;
  height: 0;
  margin-left: -2px;
  background: #7a9e7e;
  animation: sandFall 0.5s ease-in-out;
}

@keyframes sandFall {
  0% { height: 0; }
  100% { height: 20px; }
}

.hg-text {
  font-family: 'VT323', 'Courier New', monospace;
  font-size: 18px;
  color: #7a9e7e;
  letter-spacing: 2px;
  animation: hgBlink 0.5s step-end infinite;
}

@keyframes hgBlink {
  50% { opacity: 0; }
}

/* Popup Window */
.window {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 70vw;
  height: 65vh;
  background: #3a1e12;
  border: 3px solid #7a4e3a;
  box-shadow: 4px 4px 0 rgba(0,0,0,0.5), inset 0 0 0 2px #2a1208;
  display: flex;
  flex-direction: column;
  min-width: 450px;
  min-height: 400px;
  image-rendering: pixelated;
}

.window.maximized {
  width: 100% !important;
  height: calc(100vh - 40px) !important;
  top: 0 !important;
  left: 0 !important;
  transform: none !important;
}

.window-titlebar {
  display: flex;
  align-items: center;
  height: 32px;
  background: repeating-linear-gradient(
    45deg,
    #6b1d2f,
    #6b1d2f 4px,
    #8b3a4f 4px,
    #8b3a4f 8px
  );
  border-bottom: 2px solid #4a2a1e;
  flex-shrink: 0;
  padding: 0 4px;
  cursor: default;
}

.window-titlebar .win-btn {
  width: 22px;
  height: 22px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: #5c3828;
  border: 2px solid #7a4e3a;
  color: #d4c5a9;
  font-size: 12px;
  cursor: pointer;
  font-family: inherit;
  box-shadow: inset -1px -1px 0 #3a1e12;
  line-height: 1;
  flex-shrink: 0;
}

.window-titlebar .win-btn:hover {
  background: #7a4e3a;
}

.window-titlebar .win-btn:active {
  box-shadow: inset 1px 1px 0 #3a1e12;
}

/* Error dialog */
.error-win {
  position: absolute;
  width: 320px;
  background: #c0c0c0;
  border: 2px solid #fff;
  border-right-color: #444;
  border-bottom-color: #444;
  box-shadow: 2px 2px 0 rgba(0,0,0,0.3);
  font-family: 'Courier New', monospace;
  z-index: 200;
  font-size: 12px;
  color: #000;
}

.error-win .error-titlebar {
  display: flex;
  align-items: center;
  height: 24px;
  background: linear-gradient(90deg, #000080, #1084d0);
  padding: 0 4px;
  color: #fff;
  font-weight: bold;
  font-size: 11px;
}

.error-win .error-titlebar .error-title {
  flex: 1;
  text-align: left;
}

.error-win .error-titlebar .error-close {
  width: 18px;
  height: 18px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: #c0c0c0;
  border: 1px solid #fff;
  border-right-color: #444;
  border-bottom-color: #444;
  color: #000;
  font-size: 10px;
  cursor: pointer;
  font-family: inherit;
  font-weight: bold;
}

.error-win .error-titlebar .error-close:hover {
  background: #e0e0e0;
}

.error-win .error-body {
  padding: 20px 16px;
  display: flex;
  gap: 12px;
  align-items: flex-start;
}

.error-win .error-icon {
  font-size: 28px;
  flex-shrink: 0;
}

.error-win .error-text {
  font-size: 12px;
  color: #000;
  line-height: 1.4;
}

.error-win .error-ok {
  display: block;
  margin: 0 auto 10px auto;
  padding: 4px 28px;
  background: #c0c0c0;
  border: 2px solid #fff;
  border-right-color: #444;
  border-bottom-color: #444;
  font-family: inherit;
  font-size: 11px;
  cursor: pointer;
  color: #000;
  text-align: center;
}

.error-win .error-ok:hover {
  background: #d0d0d0;
}

.error-win .error-ok:active {
  border: 2px solid #444;
  border-right-color: #fff;
  border-bottom-color: #fff;
}

/* Reboot button */
#reboot-btn {
  position: fixed;
  bottom: 60px;
  left: 50%;
  transform: translateX(-50%);
  padding: 14px 40px;
  background: #c00;
  color: #fff;
  border: 3px solid #fff;
  border-right-color: #800;
  border-bottom-color: #800;
  font-family: 'VT323', 'Courier New', monospace;
  font-size: 22px;
  cursor: pointer;
  z-index: 10000;
  display: none;
  animation: rebootPulse 0.8s ease-in-out infinite;
  box-shadow: 0 0 20px rgba(200,0,0,0.5);
}

#reboot-btn:hover {
  background: #e00;
}

@keyframes rebootPulse {
  0%, 100% { box-shadow: 0 0 20px rgba(200,0,0,0.5); }
  50% { box-shadow: 0 0 40px rgba(255,0,0,0.8); }
}

/* Reboot overlay */
#shutdown-overlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100vw;
  height: 100vh;
  background: #000;
  z-index: 99999;
  display: none;
  pointer-events: none;
}

#shutdown-overlay.on {
  display: block;
  pointer-events: auto;
  animation: shutdownCRT 0.3s ease-in forwards;
}

#shutdown-overlay .reboot-msg {
  display: none;
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-family: 'VT323', 'Courier New', monospace;
  font-size: 28px;
  color: #0f0;
  text-align: center;
  letter-spacing: 2px;
  text-shadow: 0 0 10px rgba(0,255,0,0.5);
}

#shutdown-overlay .reboot-msg .cursor {
  animation: cursorBlink 0.6s step-end infinite;
}

@keyframes cursorBlink {
  50% { opacity: 0; }
}

#shutdown-overlay.show-msg {
  display: flex;
  align-items: center;
  justify-content: center;
  pointer-events: auto;
}

#shutdown-overlay.show-msg .reboot-msg {
  display: block;
}

#shutdown-overlay.fade-out {
  display: block;
  pointer-events: none;
  animation: rebootFadeUp 0.4s ease-out forwards;
}

@keyframes shutdownCRT {
  0% {
    transform: scale(1);
    filter: brightness(1);
    opacity: 1;
  }
  60% {
    transform: scale(0.02);
    filter: brightness(4);
    opacity: 0.9;
  }
  100% {
    transform: scale(0.01) translateY(30vh);
    filter: brightness(0);
    opacity: 1;
  }
}

@keyframes rebootFadeUp {
  0% {
    opacity: 1;
    filter: brightness(0);
  }
  30% {
    opacity: 1;
    filter: brightness(3);
  }
  100% {
    opacity: 0;
    filter: brightness(1);
  }
}

/* Glitch close animation */
@keyframes glitchTear {
  0% { clip-path: inset(0 0 0 0); transform: translateX(0); }
  10% { clip-path: inset(20% 0 60% 0); transform: translateX(-4px); }
  20% { clip-path: inset(50% 0 10% 0); transform: translateX(3px); }
  30% { clip-path: inset(5% 0 70% 0); transform: translateX(-6px); }
  40% { clip-path: inset(60% 0 15% 0); transform: translateX(5px); }
  50% { clip-path: inset(10% 0 50% 0); transform: translateX(-3px); }
  60% { clip-path: inset(40% 0 30% 0); transform: translateX(4px); }
  70% { clip-path: inset(15% 0 65% 0); transform: translateX(-5px); }
  80% { clip-path: inset(55% 0 5% 0); transform: translateX(2px); }
  90% { clip-path: inset(25% 0 45% 0); transform: translateX(-2px); }
  100% { clip-path: inset(0 0 0 0); transform: translateX(0); opacity: 0; }
}

@keyframes glitchFlicker {
  0%, 100% { opacity: 1; }
  8% { opacity: 0.1; }
  10% { opacity: 1; }
  25% { opacity: 0.3; }
  27% { opacity: 1; }
  45% { opacity: 0.05; }
  47% { opacity: 1; }
  65% { opacity: 0.2; }
  67% { opacity: 1; }
  85% { opacity: 0.08; }
  87% { opacity: 1; }
}

.window.glitch {
  animation:
    glitchTear 0.5s ease-out forwards,
    glitchFlicker 0.5s ease-out forwards;
  box-shadow:
    4px 4px 0 rgba(0,0,0,0.5),
    inset 0 0 0 2px #2a1208,
    -6px 0 0 rgba(255, 0, 0, 0.4),
    6px 0 0 rgba(0, 0, 255, 0.4);
}

.window-titlebar .win-title {
  flex: 1;
  text-align: center;
  font-size: 16px;
  color: #d4c5a9;
  letter-spacing: 1px;
}

.window-titlebar .win-spacer {
  width: 22px;
  flex-shrink: 0;
}

.window-body {
  flex: 1;
  padding: 16px;
  overflow-y: auto;
  font-size: 16px;
  color: #d4c5a9;
  background: #2a1208;
}

/* Folder grid */
.folder-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
  gap: 16px;
  padding: 8px;
}

.folder-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  padding: 12px 8px;
  background: #3a1e12;
  border: 2px solid #5c3828;
  cursor: pointer;
  transition: border-color 0.15s;
}

.folder-item:hover {
  border-color: #7a9e7e;
}

.folder-item .folder-icon {
  width: 48px;
  height: 36px;
  background: #7a9e7e;
  border: 2px solid #5c3828;
  border-radius: 2px 2px 0 0;
  position: relative;
  box-shadow: inset -2px -2px 0 #4a6e5e;
}

.folder-item .folder-icon::before {
  content: '';
  position: absolute;
  top: -6px;
  left: -2px;
  width: 16px;
  height: 6px;
  background: #7a9e7e;
  border: 2px solid #5c3828;
  border-bottom: none;
  border-radius: 2px 2px 0 0;
}

.folder-item .folder-label {
  font-size: 12px;
  color: #d4c5a9;
  text-align: center;
  word-break: break-word;
}

/* About Me content */
.about-content p {
  margin-bottom: 12px;
  line-height: 1.5;
}

.about-content .highlight {
  color: #7a9e7e;
}

/* Professors list */
.prof-list {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.prof-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 8px 12px;
  background: #3a1e12;
  border: 1px solid #5c3828;
  cursor: pointer;
  transition: border-color 0.15s;
}

.prof-item:hover {
  border-color: #7a9e7e;
}

.prof-item .prof-icon {
  width: 32px;
  height: 32px;
  background: #8b5e3c;
  border: 2px solid #5c3828;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
}

.prof-item .prof-name {
  font-size: 16px;
  color: #d4c5a9;
}

/* Design Assistant */
.design-assistant {
  position: fixed;
  bottom: 50px;
  right: 20px;
  z-index: 50000;
  display: none;
  flex-direction: column;
  align-items: flex-end;
}

.design-assistant.visible {
  display: flex;
}

.assistant-bubble {
  background: #ffffcc;
  border: 2px solid #000;
  padding: 12px 14px;
  font-family: 'Courier New', monospace;
  font-size: 12px;
  color: #000;
  max-width: 280px;
  position: relative;
  margin-bottom: 8px;
  border-radius: 4px;
  box-shadow: 2px 2px 0 rgba(0,0,0,0.2);
  user-select: none;
}

.assistant-bubble::after {
  content: '';
  position: absolute;
  bottom: -10px;
  right: 30px;
  width: 0;
  height: 0;
  border-left: 8px solid transparent;
  border-right: 8px solid transparent;
  border-top: 10px solid #ffffcc;
}

.assistant-bubble .bubble-text {
  line-height: 1.5;
  margin-bottom: 10px;
}

.assistant-char {
  width: 56px;
  height: 60px;
  position: relative;
  cursor: pointer;
  flex-shrink: 0;
}

.assistant-head {
  width: 44px;
  height: 36px;
  background: #c0c0c0;
  border: 2px solid #444;
  border-radius: 4px;
  position: relative;
  margin: 0 auto;
}

.assistant-eye {
  width: 7px;
  height: 7px;
  background: #000;
  border-radius: 50%;
  position: absolute;
  top: 10px;
  left: 10px;
}

.assistant-monocle {
  width: 14px;
  height: 14px;
  border: 2px solid #b8960c;
  border-radius: 50%;
  position: absolute;
  top: 7px;
  left: 20px;
}

.assistant-monocle::after {
  content: '';
  position: absolute;
  width: 8px;
  height: 2px;
  background: #b8960c;
  top: 5px;
  right: -10px;
  transform: rotate(50deg);
}

.assistant-mouth {
  position: absolute;
  bottom: 6px;
  left: 50%;
  transform: translateX(-50%);
  width: 10px;
  height: 3px;
  border-bottom: 2px solid #444;
  border-radius: 0 0 4px 4px;
}

.assistant-body {
  width: 24px;
  height: 18px;
  background: #a0a0a0;
  border: 2px solid #444;
  border-top: none;
  margin: 0 auto;
  border-radius: 0 0 3px 3px;
}

<script>
const canvas = document.getElementById('canvas-bg');
const ctx = canvas.getContext('2d');
const desktop = document.getElementById('desktop');
let zIndexCounter = 100;
const winState = {
  openWindows: {},
  activeWindow: null,
  lastMode: 'standard'
};

function resizeCanvas() {
  canvas.width = desktop.offsetWidth;
  canvas.height = desktop.offsetHeight;
  drawGrid();
}

function drawGrid() {
  const w = canvas.width;
  const h = canvas.height;
  const horizonY = h * 0.55;
  const vanishX = w / 2;
  const vanishY = horizonY;

  const sky = ctx.createLinearGradient(0, 0, 0, horizonY);
  sky.addColorStop(0, '#2a0a12');
  sky.addColorStop(0.5, '#4a1525');
  sky.addColorStop(1, '#6b1d2f');
  ctx.fillStyle = sky;
  ctx.fillRect(0, 0, w, horizonY);

  ctx.fillStyle = '#1a0a08';
  ctx.fillRect(0, horizonY, w, h - horizonY);

  const lineColors = ['#7a9e7e', '#d4c5a9', '#8b5e3c'];
  for (let i = 1; i <= 20; i++) {
    const t = i / 20;
    const y = horizonY + (h - horizonY) * t * t;
    ctx.strokeStyle = lineColors[i % 3];
    ctx.lineWidth = i < 3 ? 2 : 1;
    ctx.globalAlpha = 1 - t * 0.5;
    ctx.beginPath();
    ctx.moveTo(0, y);
    ctx.lineTo(w, y);
    ctx.stroke();
  }

  const numRays = 30;
  for (let i = 0; i < numRays; i++) {
    const angle = -Math.PI / 2 - 0.8 + (i / (numRays - 1)) * 1.6;
    const dx = Math.cos(angle);
    const dy = Math.sin(angle);
    if (dy <= 0) continue;
    const tMax = dy > 0 ? (h - vanishY) / dy : 0;
    const endX = vanishX + dx * tMax;
    const endY = vanishY + dy * tMax;
    ctx.strokeStyle = lineColors[i % 3];
    ctx.lineWidth = i % 5 === 0 ? 2 : 1;
    ctx.globalAlpha = 0.6;
    ctx.beginPath();
    ctx.moveTo(vanishX, vanishY);
    ctx.lineTo(endX, endY);
    ctx.stroke();
  }

  const grd = ctx.createRadialGradient(vanishX, vanishY, 0, vanishX, vanishY, 60);
  grd.addColorStop(0, 'rgba(212, 197, 169, 0.4)');
  grd.addColorStop(0.5, 'rgba(212, 197, 169, 0.1)');
  grd.addColorStop(1, 'rgba(212, 197, 169, 0)');
  ctx.fillStyle = grd;
  ctx.beginPath();
  ctx.arc(vanishX, vanishY, 60, 0, Math.PI * 2);
  ctx.fill();
  ctx.globalAlpha = 1;
}

window.addEventListener('resize', resizeCanvas);
resizeCanvas();

// Audio - 8-bit sound effects
let audioCtx = null;
function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

function playBlip() {
  const ctx = getAudioCtx();
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.type = 'square';
  osc.frequency.value = 1000;
  gain.gain.setValueAtTime(0.04, ctx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.06);
  osc.connect(gain).connect(ctx.destination);
  osc.start(ctx.currentTime);
  osc.stop(ctx.currentTime + 0.06);
}

function playChime() {
  const ctx = getAudioCtx();
  const notes = [523, 659, 784];
  notes.forEach((freq, i) => {
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = 'triangle';
    osc.frequency.value = freq;
    const t = ctx.currentTime + i * 0.1;
    gain.gain.setValueAtTime(0.07, t);
    gain.gain.exponentialRampToValueAtTime(0.001, t + 0.12);
    osc.connect(gain).connect(ctx.destination);
    osc.start(t);
    osc.stop(t + 0.12);
  });
}

function playZap() {
  const ctx = getAudioCtx();
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.type = 'sawtooth';
  osc.frequency.setValueAtTime(600, ctx.currentTime);
  osc.frequency.exponentialRampToValueAtTime(80, ctx.currentTime + 0.4);
  gain.gain.setValueAtTime(0.06, ctx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.4);
  osc.connect(gain).connect(ctx.destination);
  osc.start(ctx.currentTime);
  osc.stop(ctx.currentTime + 0.4);
}

function playDodge() {
  const ctx = getAudioCtx();
  [880, 1320].forEach((freq, i) => {
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = 'square';
    osc.frequency.value = freq;
    const t = ctx.currentTime + i * 0.04;
    gain.gain.setValueAtTime(0.05, t);
    gain.gain.exponentialRampToValueAtTime(0.001, t + 0.05);
    osc.connect(gain).connect(ctx.destination);
    osc.start(t);
    osc.stop(t + 0.05);
  });
}

function playSnapBack() {
  const ctx = getAudioCtx();
  [660, 880, 1100].forEach((freq, i) => {
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = 'triangle';
    osc.frequency.value = freq;
    const t = ctx.currentTime + i * 0.06 + 0.05;
    gain.gain.setValueAtTime(0.07, t);
    gain.gain.exponentialRampToValueAtTime(0.001, t + 0.1);
    osc.connect(gain).connect(ctx.destination);
    osc.start(t);
    osc.stop(t + 0.1);
  });
}

function playErrorBeep() {
  const ctx = getAudioCtx();
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.type = 'square';
  osc.frequency.setValueAtTime(800, ctx.currentTime);
  osc.frequency.setValueAtTime(400, ctx.currentTime + 0.08);
  gain.gain.setValueAtTime(0.08, ctx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.15);
  osc.connect(gain).connect(ctx.destination);
  osc.start(ctx.currentTime);
  osc.stop(ctx.currentTime + 0.15);
}

function playPowerDown() {
  const ctx = getAudioCtx();
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.type = 'sawtooth';
  osc.frequency.setValueAtTime(400, ctx.currentTime);
  osc.frequency.exponentialRampToValueAtTime(20, ctx.currentTime + 0.5);
  gain.gain.setValueAtTime(0.1, ctx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.5);
  osc.connect(gain).connect(ctx.destination);
  osc.start(ctx.currentTime);
  osc.stop(ctx.currentTime + 0.5);
}

function playStartupChime() {
  const ctx = getAudioCtx();
  const notes = [392, 523, 659, 784, 1047];
  notes.forEach((freq, i) => {
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = 'triangle';
    osc.frequency.value = freq;
    const t = ctx.currentTime + i * 0.15;
    gain.gain.setValueAtTime(0, t);
    gain.gain.linearRampToValueAtTime(0.09, t + 0.02);
    gain.gain.exponentialRampToValueAtTime(0.001, t + 0.35);
    osc.connect(gain).connect(ctx.destination);
    osc.start(t);
    osc.stop(t + 0.35);
  });
}

function playPop() {
  const ctx = getAudioCtx();
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.type = 'triangle';
  osc.frequency.setValueAtTime(900, ctx.currentTime);
  osc.frequency.exponentialRampToValueAtTime(1800, ctx.currentTime + 0.04);
  gain.gain.setValueAtTime(0.06, ctx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.1);
  osc.connect(gain).connect(ctx.destination);
  osc.start(ctx.currentTime);
  osc.stop(ctx.currentTime + 0.1);
}

function playSiren() {
  const ctx = getAudioCtx();
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.type = 'square';
  gain.gain.setValueAtTime(0.05, ctx.currentTime);
  for (let i = 0; i < 30; i++) {
    const t = ctx.currentTime + i * 0.08;
    osc.frequency.setValueAtTime(i % 2 === 0 ? 880 : 440, t);
  }
  gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 2.5);
  osc.connect(gain).connect(ctx.destination);
  osc.start(ctx.currentTime);
  osc.stop(ctx.currentTime + 2.5);
}

function playStaticFlash() {
  const ctx = getAudioCtx();
  const len = ctx.sampleRate * 0.15;
  const buf = ctx.createBuffer(1, len, ctx.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < len; i++) d[i] = (Math.random() * 2 - 1) * (1 - i / len);
  const src = ctx.createBufferSource();
  src.buffer = buf;
  const g = ctx.createGain();
  g.gain.value = 0.04;
  src.connect(g).connect(ctx.destination);
  src.start(ctx.currentTime);
}

function playBoing() {
  const ctx = getAudioCtx();
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.type = 'triangle';
  osc.frequency.setValueAtTime(1400, ctx.currentTime);
  osc.frequency.exponentialRampToValueAtTime(200, ctx.currentTime + 0.18);
  gain.gain.setValueAtTime(0.09, ctx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.25);
  osc.connect(gain).connect(ctx.destination);
  osc.start(ctx.currentTime);
  osc.stop(ctx.currentTime + 0.25);
  const len = ctx.sampleRate * 0.04;
  const buf = ctx.createBuffer(1, len, ctx.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < len; i++) d[i] = (Math.random() * 2 - 1) * (1 - i / len);
  const src = ctx.createBufferSource();
  src.buffer = buf;
  const g = ctx.createGain();
  g.gain.setValueAtTime(0.05, ctx.currentTime + 0.14);
  g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.2);
  src.connect(g).connect(ctx.destination);
  src.start(ctx.currentTime + 0.14);
}

// Clock update
function updateClocks() {
  const now = new Date();
  const pk = new Date(now.toLocaleString('en-US', { timeZone: 'Asia/Karachi' }));
  const it = new Date(now.toLocaleString('en-US', { timeZone: 'Europe/Rome' }));
  document.getElementById('clock-pk').textContent = pk.toLocaleTimeString('en-US', { hour12: false });
  document.getElementById('clock-it').textContent = it.toLocaleTimeString('en-US', { hour12: false });
}
setInterval(updateClocks, 1000);
updateClocks();

// Hourglass processing
const hgOverlay = document.getElementById('hourglass-overlay');

function showHourglass(callback) {
  hgOverlay.classList.add('on');
  const stream = document.querySelector('.hg-sand-stream');
  stream.style.animation = 'none';
  void stream.offsetWidth;
  stream.style.animation = 'sandFall 0.5s ease-in-out';
  setTimeout(() => {
    hgOverlay.classList.remove('on');
    callback();
  }, 500);
}

  about: `

      <p class="highlight">Important System Note: When I am not designing, I am hunting down pistachio. Pistachio gelato, pistachio croissants, pistachio pesto... mamma mia, if it has pistachio in it, I will eat it. It's not a preference; it's a lifestyle.</p>
    </div>
  `,

      <br>

      <p><strong>Interaction Design 2</strong><br>

      <p><strong>Interaction Design 3</strong><br>

      <br>

      <p><strong>ABADIR</strong><br>
      Academy of Design and Visual Communication<br>
      Sant'Agata li Battiati CT<br>
      AA 2025-26</p>
    </div>
  `
};

function createWindow(type, title) {
  if (winState.openWindows[type]) {
    if (winState.openWindows[type].state === 'minimized') {
      restoreWindow(type);
    } else {
      bringToFront(winState.openWindows[type].domElement);
    }
    return;
  }

  const win = document.createElement('div');
  win.className = 'window';
  win.dataset.type = type;
  win.style.zIndex = ++zIndexCounter;

  win.innerHTML = `
    <div class="window-titlebar">
      <span class="win-title">${title}</span>
      <span class="win-btn win-maximize" title="Maximize">&#x25a1;</span>
      <span class="win-btn win-close" title="Close">&#x2715;</span>
    </div>
    <div class="window-body"></div>
  `;

  desktop.appendChild(win);

  const body = win.querySelector('.window-body');
  if (type === 'exercises') {
    buildExerciseGrid(body);
  } else {
    body.innerHTML = WINDOW_CONTENT[type] || '';
  }
  body.querySelectorAll('.prof-item').forEach(item => {
    item.addEventListener('mouseenter', playBlip);
  });

  const closeBtn = win.querySelector('.win-close');

  function closeWithGlitch() {
    win.classList.add('glitch');
    playZap();
    setTimeout(() => {
      win.remove();
      delete winState.openWindows[type];
      if (winState.activeWindow === type) winState.activeWindow = null;
    }, 500);
  }

  if (type === 'about') {
    let dodgeCount = 0;
    let dodging = false;
    let deactivated = false;
    let goLeft = true;
    const titlebar = win.querySelector('.window-titlebar');

    const onMove = (e) => {
      if (win.classList.contains('maximized') || deactivated) return;
      const rect = closeBtn.getBoundingClientRect();
      const dist = Math.hypot(e.clientX - (rect.left + rect.width / 2), e.clientY - (rect.top + rect.height / 2));
      if (dist < 35) {
        if (dodgeCount < 5 && !dodging) {
          dodging = true;
          closeBtn.style.transition = 'transform 0.05s ease';
          closeBtn.style.transform = `translateX(${goLeft ? -50 : 50}px)`;
          playDodge();
          goLeft = !goLeft;
          dodgeCount++;
        } else if (dodgeCount >= 5 && !dodging) {
          deactivated = true;
          dodging = true;
          closeBtn.style.transition = 'transform 0.1s ease';
          closeBtn.style.transform = 'translateX(0)';
          playSnapBack();
        }
      } else {
        dodging = false;
      }
    };

    titlebar.addEventListener('mousemove', onMove);
    titlebar.addEventListener('mouseleave', () => {
      dodging = false;
    });

    const escHandler = (e) => {
      if (e.key === 'Escape') {
        closeBtn.style.transform = 'translateX(0)';
        closeBtn.style.transition = 'none';
        document.removeEventListener('keydown', escHandler);
        closeWithGlitch();
      }
    };
    document.addEventListener('keydown', escHandler);

    closeBtn.addEventListener('click', function doClose() {
      if (!win.classList.contains('maximized') && !deactivated) return;
      document.removeEventListener('keydown', escHandler);
      closeWithGlitch();
    });
  } else {
    closeBtn.addEventListener('click', closeWithGlitch);
  }

  win.querySelector('.win-maximize').addEventListener('click', () => {
    playBlip();
    win.classList.toggle('maximized');
    winState.lastMode = win.classList.contains('maximized') ? 'maximized' : 'standard';
    win.style.top = '';
    win.style.left = '';
    win.style.transform = '';
  });

  win.addEventListener('mousedown', () => bringToFront(win));

  winState.openWindows[type] = { type, title, domElement: win, state: 'open', tabElement: null };
  winState.activeWindow = type;
  if (winState.lastMode === 'maximized') {
    win.classList.add('maximized');
    win.style.top = '';
    win.style.left = '';
    win.style.transform = '';
  }
  bringToFront(win);
}

function bringToFront(win) {
  win.style.zIndex = ++zIndexCounter;
}

function minimizeWindow(type) {
  const entry = winState.openWindows[type];
  if (!entry || entry.state !== 'open') return;

  const win = entry.domElement;
  if (winState.activeWindow === type) winState.activeWindow = null;

  const rect = win.getBoundingClientRect();

  win.style.left = rect.left + 'px';
  win.style.top = rect.top + 'px';
  win.style.transform = 'none';
  win.style.width = rect.width + 'px';
  win.style.height = rect.height + 'px';

  void win.offsetWidth;

  const targetX = 10;
  const targetY = window.innerHeight - 20;
  const dx = targetX - rect.left;
  const dy = targetY - rect.top;

  win.style.transition = 'transform 0.25s cubic-bezier(0.65, 0, 0.35, 1), opacity 0.2s ease-in';
  win.style.transform = `translate(${dx}px, ${dy}px) scale(0.08)`;
  win.style.opacity = '0';

  setTimeout(() => {
    win.style.display = 'none';
    entry.state = 'minimized';

    const tab = document.createElement('div');
    tab.className = 'taskbar-tab';
    tab.innerHTML = `<span>${entry.title}</span><span class="tab-close">&#x2715;</span>`;

    tab.addEventListener('click', function guard(e) {
      if (window._ghostWasDragged) { e.stopImmediatePropagation(); window._ghostWasDragged = false; }
    });
    tab.addEventListener('mousedown', (e) => {
      if (e.button !== 0 || e.target.classList.contains('tab-close')) return;
      startGhostDrag(e, {
        html: `<span class="ghost-label">${entry.title}</span>`,
        onClick: () => restoreWindow(type)
      });
    });
    tab.addEventListener('click', (e) => {
      if (e.target.classList.contains('tab-close')) return;
      restoreWindow(type);
    });

    tab.querySelector('.tab-close').addEventListener('click', (e) => {
      e.stopPropagation();
      tab.classList.add('glitch');
      playZap();
      setTimeout(() => {
        win.remove();
        tab.remove();
        delete winState.openWindows[type];
        if (winState.activeWindow === type) winState.activeWindow = null;
      }, 500);
    });

    document.getElementById('taskbar-tabs').appendChild(tab);
    entry.tabElement = tab;
  }, 250);
}

function restoreWindow(type) {
  const entry = winState.openWindows[type];
  if (!entry || entry.state !== 'minimized') return;

  if (winState.activeWindow && winState.activeWindow !== type) {
    minimizeWindow(winState.activeWindow);
  }

  if (entry.tabElement) {
    entry.tabElement.remove();
    entry.tabElement = null;
  }

  const win = entry.domElement;
  bringToFront(win);

  win.style.left = '';
  win.style.top = '';
  win.style.width = '';
  win.style.height = '';
  win.style.transform = '';
  win.style.opacity = '';
  win.style.transition = '';
  win.style.display = '';

  win.style.opacity = '0';
  void win.offsetWidth;

  const winWidth = win.offsetWidth;
  const winHeight = win.offsetHeight;
  const centerLeft = (window.innerWidth - winWidth) / 2;
  const centerTop = (window.innerHeight - winHeight) / 2;

  win.style.left = centerLeft + 'px';
  win.style.top = centerTop + 'px';
  win.style.width = winWidth + 'px';
  win.style.height = winHeight + 'px';
  win.style.transform = 'none';
  void win.offsetWidth;

  const targetX = 10;
  const targetY = window.innerHeight - 20;
  const dx = targetX - centerLeft;
  const dy = targetY - centerTop;
  win.style.transform = `translate(${dx}px, ${dy}px) scale(0.08)`;
  void win.offsetWidth;

  win.style.transition = 'transform 0.25s cubic-bezier(0, 0, 0.35, 1), opacity 0.2s ease-out';
  win.style.transform = 'none';
  win.style.opacity = '1';

  function onRestoreEnd(e) {
    if (e && e.propertyName !== 'transform') return;
    win.removeEventListener('transitionend', onRestoreEnd);
    win.style.transition = '';
    win.style.left = '';
    win.style.top = '';
    win.style.width = '';
    win.style.height = '';
    win.style.transform = '';
    win.style.opacity = '';
    entry.state = 'open';
    winState.activeWindow = type;
    playChime();
  }
  win.addEventListener('transitionend', onRestoreEnd);
}

function buildExerciseGrid(container) {

// DO NOT CLICK — error cascade
let errorWindowCount = 0;
let isRebooting = false;
const errorWindows = [];

function spawnError(offsetX, offsetY) {
  playErrorBeep();
  errorWindowCount++;
  const d = document.createElement('div');
  d.className = 'error-win';
  const maxX = window.innerWidth - 340;
  const maxY = window.innerHeight - 160;
  let left = offsetX;
  let top = offsetY;
  if (left > maxX) left = left - window.innerWidth + 20;
  if (top > maxY) top = top - window.innerHeight + 20;
  if (left < 0) left = 20;
  if (top < 0) top = 20;
  d.style.left = left + 'px';
  d.style.top = top + 'px';
  d.innerHTML = `
    <div class="error-titlebar">
      <span class="error-title">System Alert</span>
      <button class="error-close">&times;</button>
    </div>
    <div class="error-body">
      <div class="error-icon">&#x26a0;</div>
      <div class="error-text">Error 404: Too Much Aesthetic.</div>
    </div>
    <button class="error-ok">OK</button>
  `;
  document.body.appendChild(d);
  errorWindows.push(d);

  const okBtn = d.querySelector('.error-ok');
  const closeBtn = d.querySelector('.error-close');
  const spawnTwo = () => {
    spawnError(left + 25, top + 25);
    spawnError(left + 50, top + 50);
  };
  okBtn.addEventListener('click', spawnTwo);
  closeBtn.addEventListener('click', spawnTwo);
  updateRebootButton();
}

function updateRebootButton() {
  const btn = document.getElementById('reboot-btn') || createRebootButton();
  btn.style.display = errorWindowCount >= 5 ? 'block' : 'none';
}

function createRebootButton() {
  const btn = document.createElement('button');
  btn.id = 'reboot-btn';
  btn.textContent = 'REBOOT SYSTEM';
  btn.addEventListener('click', startReboot);
  document.body.appendChild(btn);
  return btn;
}

function startReboot() {
  if (isRebooting) return;
  isRebooting = true;
  const btn = document.getElementById('reboot-btn');
  if (btn) btn.style.display = 'none';

  // Phase 1 — CRT collapse (0-300ms)
  playPowerDown();
  let overlay = document.getElementById('shutdown-overlay');
  if (!overlay) {
    overlay = document.createElement('div');
    overlay.id = 'shutdown-overlay';
    document.body.appendChild(overlay);
  }
  overlay.className = '';
  overlay.innerHTML = '<div class="reboot-msg">SYSTEM REBOOT IN PROGRESS...<span class="cursor">_</span></div>';
  requestAnimationFrame(() => overlay.classList.add('on'));

  // Phase 2 — loading screen (300ms - 2000ms)
  setTimeout(() => {
    overlay.classList.remove('on');
    overlay.classList.add('show-msg');
  }, 300);

  // Phase 3 — wake up (2000ms)
  setTimeout(() => {
    playStartupChime();
    overlay.classList.remove('show-msg');
    overlay.classList.add('fade-out');
    errorWindows.forEach(d => d.remove());
    errorWindows.length = 0;
    errorWindowCount = 0;
  }, 2000);

  // Cleanup (2400ms)
  setTimeout(() => {
    overlay.remove();
    isRebooting = false;
  }, 2400);
}

document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape' && errorWindowCount > 0) startReboot();
});

// Design Assistant
const ASSISTANT_DIALOGUES = [
  "I've been scanning your layout. Are you aware that your margins deviate from the Vignelli grid by exactly 3 pixels? My eyes are burning.",
  "Is that a non-standard font weight I spy? The Bauhaus masters didn't die for you to disrespect white space like this.",
  "That's it. This entire layout is an offense to Swiss typography. It cannot be saved. I am purging this visual disaster from the server."
];
let assistantStage = -1;
let assistantActive = false;
let assistantTimer = null;

function showAssistant() {
  if (assistantActive || document.querySelector('.fatal-error')) return;
  assistantActive = true;
  assistantStage = -1;
  document.getElementById('design-assistant').classList.add('visible');
  advanceAssistant();
}

function advanceAssistant() {
  if (!assistantActive) return;
  playPop();
  assistantStage++;
  const bubble = document.getElementById('bubble-text');
  const btn = document.getElementById('assistant-btn');

  if (assistantStage < 3) {
    bubble.textContent = ASSISTANT_DIALOGUES[assistantStage];
    btn.textContent = assistantStage < 2 ? 'Next' : 'Unleash';
    btn.onclick = advanceAssistant;
  }

  if (assistantStage === 3) {
    triggerBreakdown();
  }
}

function dismissAssistant() {
  assistantActive = false;
  document.getElementById('design-assistant').classList.remove('visible');
}

function triggerBreakdown() {
  dismissAssistant();
  playSiren();

  // Scramble text
  const walker = document.createTreeWalker(document.body, NodeFilter.SHOW_TEXT);
  const textNodes = [];
  while (walker.nextNode()) textNodes.push(walker.currentNode);
  let iter = 0;
  const scrambleInt = setInterval(() => {
    textNodes.forEach(n => {
      if (!n.textContent.trim() || n.parentElement?.closest?.('.assistant-bubble,.fatal-error,.error-win,#shutdown-overlay')) return;
      n.textContent = n.textContent.split('').map(c => c.trim() ? String.fromCharCode(33 + Math.random() * 94) : c).join('');
    });
    iter++;
    if (iter > 30) clearInterval(scrambleInt);
  }, 60);

  // Tilt images
  document.querySelectorAll('img').forEach(img => {
    img.style.transform = `rotate(${(Math.random() * 30 - 15).toFixed(1)}deg) scale(0.9)`;
    img.style.filter = 'contrast(0) brightness(1.3)';
    img.style.transition = 'transform 0.3s, filter 0.3s';
  });

  // Shake sidebar
  document.getElementById('sidebar')?.classList.add('sidebar-shake');

  // Slide windows away staggered
  document.querySelectorAll('.window').forEach((win, i) => {
    setTimeout(() => {
      win.style.transition = 'transform 0.5s ease-in, opacity 0.4s';
      win.style.transform = `translateX(${i % 2 === 0 ? '' : '-'}200vw)`;
      win.style.opacity = '0';
    }, i * 150);
  });

  // Show fatal error early
  setTimeout(() => {
    showFatalError();
  }, 600);

  // Fade to black behind the error
  setTimeout(() => {
    const bo = document.createElement('div');
    bo.id = 'breakdown-blackout';
    document.body.appendChild(bo);
    requestAnimationFrame(() => bo.classList.add('on'));
    document.getElementById('sidebar')?.classList.remove('sidebar-shake');
  }, 1400);
}

function showFatalError() {
  const d = document.createElement('div');
  d.className = 'error-win fatal-error';
  d.style.left = ((window.innerWidth - 360) / 2) + 'px';
  d.style.top = ((window.innerHeight - 130) / 2) + 'px';
  d.style.zIndex = 100000;

let binCharge = {
  state: 'idle',
  ghost: null,
  origRect: null,
  timer: null
};

function startBinCharge(ghost, origRect) {
  if (binCharge.state !== 'idle') {
    ghost.remove();
    return;
  }
  binCharge.state = 'charging';
  binCharge.ghost = ghost;
  binCharge.origRect = origRect;

  const binRect = document.getElementById('desktop-bin').getBoundingClientRect();
  const binCx = binRect.left + binRect.width / 2;
  const binCy = binRect.top + binRect.height / 2;
  const gRect = ghost.getBoundingClientRect();
  ghost.style.transition = 'left 0.15s ease-in, top 0.15s ease-in, width 0.15s ease-in, height 0.15s ease-in, opacity 0.15s ease-in';
  ghost.style.left = (binCx - gRect.width / 2) + 'px';
  ghost.style.top = (binCy - gRect.height / 2) + 'px';
  ghost.style.width = '20px';
  ghost.style.height = '20px';
  ghost.style.opacity = '0.3';
  ghost.style.pointerEvents = 'none';

  document.getElementById('desktop-bin').classList.add('bin-charging');

  binCharge.timer = setTimeout(() => ejectBinCharge(), 1000);
}

function ejectBinCharge() {
  if (binCharge.state !== 'charging') return;
  binCharge.state = 'ejecting';

  document.getElementById('desktop-bin').classList.remove('bin-charging');

  playBoing();

  const ghost = binCharge.ghost;
  const binRect = document.getElementById('desktop-bin').getBoundingClientRect();
  const binCx = binRect.left + binRect.width / 2;
  const binCy = binRect.top + binRect.height / 2;
  const gRect = ghost.getBoundingClientRect();
  ghost.style.transition = 'none';
  ghost.style.left = (binCx - gRect.width / 2) + 'px';
  ghost.style.top = (binCy - gRect.height / 2) + 'px';
  ghost.style.width = '20px';
  ghost.style.height = '20px';
  ghost.style.opacity = '1';

  void ghost.offsetWidth;

  ghost.style.transition = 'left 0.3s cubic-bezier(0.25, 0.1, 0.25, 1), top 0.3s cubic-bezier(0.25, 0.1, 0.25, 1), width 0.2s ease, height 0.2s ease';
  ghost.style.left = binCharge.origRect.left + 'px';
  ghost.style.top = binCharge.origRect.top + 'px';
  ghost.style.width = binCharge.origRect.width + 'px';
  ghost.style.height = binCharge.origRect.height + 'px';

  ghost.addEventListener('transitionend', function cleanup() {
    ghost.removeEventListener('transitionend', cleanup);
    ghost.remove();
    resetBinCharge();
  });

  setTimeout(() => {
    if (binCharge.state === 'ejecting') {
      ghost.remove();
      resetBinCharge();
    }
  }, 500);
}

function resetBinCharge() {
  document.getElementById('desktop-bin').classList.remove('bin-charging');
  if (binCharge.timer) {
    clearTimeout(binCharge.timer);
    binCharge.timer = null;
  }
  binCharge.state = 'idle';
  binCharge.ghost = null;
  binCharge.origRect = null;
}

// Ghost drag-and-drop for sidebar items + taskbar tabs
let ghostDragState = null;

function createDragGhost(rect, html) {
  const g = document.createElement('div');
  g.className = 'drag-ghost';
  g.innerHTML = html;
  g.style.left = rect.left + 'px';
  g.style.top = rect.top + 'px';
  g.style.width = rect.width + 'px';
  g.style.height = rect.height + 'px';
  document.body.appendChild(g);
  return g;
}

function checkBinHit(ghost) {
  const gRect = ghost.getBoundingClientRect();
  const bRect = document.getElementById('desktop-bin').getBoundingClientRect();
  const bCx = bRect.left + bRect.width / 2;
  const bCy = bRect.top + bRect.height / 2;
  const cX = Math.max(gRect.left, Math.min(bCx, gRect.right));
  const cY = Math.max(gRect.top, Math.min(bCy, gRect.bottom));
  return Math.hypot(bCx - cX, bCy - cY) <= 40;
}

function startGhostDrag(e, config) {
  if (binCharge.state !== 'idle') return;
  const t = e.currentTarget;
  const r = t.getBoundingClientRect();
  const ghost = createDragGhost(r, config.html);
  config.origRect = r;
  ghostDragState = { ghost, config, startX: e.clientX, startY: e.clientY, oX: r.left, oY: r.top, active: false };
  document.addEventListener('mousemove', onGhostMove);
  document.addEventListener('mouseup', endGhostDrag);
}

function onGhostMove(e) {
  if (!ghostDragState) return;
  const dx = e.clientX - ghostDragState.startX;
  const dy = e.clientY - ghostDragState.startY;
  if (!ghostDragState.active && (Math.abs(dx) > 5 || Math.abs(dy) > 5)) {
    ghostDragState.active = true;
    window._ghostWasDragged = true;
  }
  if (!ghostDragState.active) return;
  ghostDragState.ghost.style.left = (ghostDragState.oX + dx) + 'px';
  ghostDragState.ghost.style.top = (ghostDragState.oY + dy) + 'px';
  if (checkBinHit(ghostDragState.ghost)) {
    const state = ghostDragState;
    state.ghost.style.transition = 'none';
    document.removeEventListener('mousemove', onGhostMove);
    document.removeEventListener('mouseup', endGhostDrag);
    ghostDragState = null;
    startBinCharge(state.ghost, state.config.origRect);
  }
}

function endGhostDrag() {
  if (!ghostDragState) return;
  ghostDragState.ghost.remove();
  ghostDragState = null;
  document.removeEventListener('mousemove', onGhostMove);
  document.removeEventListener('mouseup', endGhostDrag);
}

// Sidebar handlers
document.querySelectorAll('.sidebar-item').forEach(item => {
  item.addEventListener('mouseenter', playBlip);
  // Ghost drag init
  item.addEventListener('mousedown', (e) => {
    if (e.button !== 0) return;
    const icon = item.querySelector('.icon')?.innerHTML || '';
    const label = item.querySelector('span:last-child')?.textContent || '';
    startGhostDrag(e, {
      html: `<span class="ghost-icon">${icon}</span><span class="ghost-label">${label}</span>`,
      onClick: () => item.click()
    });
  });
  item.addEventListener('click', () => {
    if (item.id === 'do-not-click' || item.id === 'analyze-design') return;
    const type = item.dataset.window;
    const titles = { about: 'About Me', exercises: 'Exercises', professors: 'Credits' };

    if (winState.openWindows[type]?.state === 'open') {
      bringToFront(winState.openWindows[type].domElement);
      return;
    }

    if (winState.openWindows[type]?.state === 'minimized') {
      restoreWindow(type);
      return;
    }

    if (winState.activeWindow) {
      const activeWin = winState.openWindows[winState.activeWindow]?.domElement;
      winState.lastMode = activeWin?.classList.contains('maximized') ? 'maximized' : 'standard';
      minimizeWindow(winState.activeWindow);
    } else {
      winState.lastMode = 'standard';
    }

    showHourglass(() => {
      createWindow(type, titles[type]);
      playChime();
    });
  });
});
