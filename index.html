<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Retro Portfolio</title>
<link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

html, body {
  width: 100vw;
  height: 100vh;
  overflow: hidden;
  font-family: 'VT323', 'Courier New', monospace;
  color: #d4c5a9;
  background: #6b1d2f;
  user-select: none;
}

#app {
  display: flex;
  flex-direction: column;
  width: 100vw;
  height: 100vh;
}

#main {
  display: flex;
  flex: 1;
  position: relative;
  overflow: hidden;
}

#canvas-bg {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: 0;
}

#bg-title {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  z-index: 0;
  font-size: clamp(36px, 6vw, 80px);
  font-weight: 900;
  font-family: 'VT323', 'Courier New', monospace;
  text-align: center;
  pointer-events: none;
  letter-spacing: 6px;
  text-transform: uppercase;
  color: #6b1d2f;
  -webkit-text-stroke: 2px #8b5e3c;
  text-shadow:
    3px 3px 0 #4a1525,
    -1px -1px 0 #7a9e7e,
    6px 6px 0 rgba(74, 21, 37, 0.6);
}

/* Sidebar */
#sidebar {
  width: 200px;
  flex-shrink: 0;
  background: #4a2a1e;
  border-right: 3px solid #8b5e3c;
  padding: 16px 8px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  position: relative;
  z-index: 1;
  box-shadow: inset -2px 0 8px rgba(0,0,0,0.3);
}

.sidebar-title {
  text-align: center;
  font-size: 18px;
  color: #d4c5a9;
  padding-bottom: 12px;
  border-bottom: 2px solid #8b5e3c;
  margin-bottom: 8px;
  text-transform: uppercase;
  letter-spacing: 2px;
}

.sidebar-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 12px;
  background: #5c3828;
  border: 2px solid #7a4e3a;
  color: #d4c5a9;
  font-size: 18px;
  cursor: pointer;
  transition: background 0.15s;
  font-family: inherit;
  image-rendering: pixelated;
  box-shadow: 2px 2px 0 #3a1e12, inset 1px 1px 0 #7a5a4a;
}

.sidebar-item:hover {
  background: #7a4e3a;
  border-color: #d4c5a9;
}

.sidebar-item:active {
  box-shadow: inset 2px 2px 0 #3a1e12;
  transform: translate(1px, 1px);
}

.sidebar-item .icon {
  width: 24px;
  height: 24px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  background: #6b1d2f;
  border: 1px solid #8b5e3c;
  box-shadow: inset -1px -1px 0 #3a1e12;
}

/* Desktop area */
#desktop {
  flex: 1;
  position: relative;
  z-index: 1;
}

/* Taskbar */
#taskbar {
  height: 40px;
  flex-shrink: 0;
  background: #4a2a1e;
  border-top: 3px solid #8b5e3c;
  display: flex;
  align-items: center;
  padding: 0 12px;
  position: relative;
  z-index: 100;
  box-shadow: inset 0 2px 4px rgba(0,0,0,0.3);
}

#marquee-wrap {
  flex: 1;
  overflow: hidden;
  white-space: nowrap;
  font-size: 16px;
  color: #7a9e7e;
}

#marquee-text {
  display: inline-block;
  animation: scrollMarquee 20s linear infinite;
}

@keyframes scrollMarquee {
  from { transform: translateX(100%); }
  to { transform: translateX(-100%); }
}

#clocks {
  display: flex;
  gap: 16px;
  font-size: 16px;
  color: #d4c5a9;
  margin-left: 16px;
  flex-shrink: 0;
}

.clock {
  display: flex;
  align-items: center;
  gap: 4px;
}

/* CRT overlay */
#crt-overlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100vw;
  height: 100vh;
  z-index: 9999;
  pointer-events: none;
  display: none;
}

#crt-overlay.on {
  display: block;
}

#crt-overlay::after {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(0, 0, 0, 0.08) 2px,
    rgba(0, 0, 0, 0.08) 4px
  );
  animation: scanlineMove 0.1s linear infinite;
}

@keyframes scanlineMove {
  from { transform: translateY(0); }
  to { transform: translateY(4px); }
}

#crt-overlay::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: radial-gradient(
    ellipse at center,
    transparent 60%,
    rgba(0, 0, 0, 0.5) 100%
  );
  animation: crtFlicker 4s infinite;
}

@keyframes crtFlicker {
  0%, 100% { opacity: 1; }
  3% { opacity: 0.97; }
  6% { opacity: 1; }
  42% { opacity: 0.98; }
  44% { opacity: 1; }
  76% { opacity: 0.96; }
  78% { opacity: 1; }
  92% { opacity: 0.97; }
  94% { opacity: 1; }
}

/* CRT toggle button */
#crt-toggle {
  display: flex;
  align-items: center;
  gap: 4px;
  padding: 2px 8px;
  background: #5c3828;
  border: 2px solid #7a4e3a;
  color: #d4c5a9;
  font-family: inherit;
  font-size: 12px;
  cursor: pointer;
  margin-left: 8px;
  flex-shrink: 0;
  box-shadow: inset -1px -1px 0 #3a1e12;
  line-height: 1;
}

#crt-toggle:hover {
  background: #7a4e3a;
}

#crt-toggle:active {
  box-shadow: inset 1px 1px 0 #3a1e12;
}

#crt-toggle.active {
  background: #7a9e7e;
  border-color: #5c7a5e;
}

/* Taskbar tabs for minimized windows */
#taskbar-tabs {
  display: flex;
  align-items: center;
  gap: 4px;
  flex-shrink: 0;
  margin-right: 8px;
}

.taskbar-tab {
  display: flex;
  align-items: center;
  gap: 4px;
  padding: 2px 8px;
  background: #5c3828;
  border: 2px solid #7a4e3a;
  color: #d4c5a9;
  font-size: 12px;
  cursor: pointer;
  font-family: inherit;
  box-shadow: inset -1px -1px 0 #3a1e12;
  flex-shrink: 0;
  line-height: 1;
}

.taskbar-tab:hover {
  background: #7a4e3a;
}

.taskbar-tab:active {
  box-shadow: inset 1px 1px 0 #3a1e12;
}

.taskbar-tab .tab-close {
  margin-left: 4px;
  font-size: 10px;
  cursor: pointer;
  color: #d4c5a9;
}

.taskbar-tab .tab-close:hover {
  color: #ff6b6b;
}

/* Minimize animation */
@keyframes minimizeToTaskbar {
  0% {
    transform: translate(-50%, -50%) scale(1);
    opacity: 1;
  }
  100% {
    transform: translate(-42vw, 65vh) scale(0.15);
    opacity: 0;
  }
}

.window.minimizing {
  animation: minimizeToTaskbar 0.3s ease-in forwards;
  pointer-events: none;
}

/* Restore animation */
@keyframes restoreFromTaskbar {
  0% {
    transform: translate(-42vw, 65vh) scale(0.15);
    opacity: 0;
  }
  100% {
    transform: translate(-50%, -50%) scale(1);
    opacity: 1;
  }
}

.window.restoring {
  animation: restoreFromTaskbar 0.3s ease-out forwards;
}

/* Hourglass overlay */
#hourglass-overlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100vw;
  height: 100vh;
  z-index: 10000;
  display: none;
  align-items: center;
  justify-content: center;
  background: rgba(0, 0, 0, 0.6);
  pointer-events: none;
}

#hourglass-overlay.on {
  display: flex;
}

.hourglass-box {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 16px;
}

.hourglass {
  position: relative;
  width: 50px;
  height: 90px;
}

.hg-top {
  width: 0;
  height: 0;
  border-left: 25px solid transparent;
  border-right: 25px solid transparent;
  border-bottom: 35px solid #d4c5a9;
}

.hg-bottom {
  width: 0;
  height: 0;
  border-left: 25px solid transparent;
  border-right: 25px solid transparent;
  border-top: 35px solid #d4c5a9;
  margin-top: -1px;
}

.hg-sand-stream {
  position: absolute;
  top: 35px;
  left: 50%;
  width: 4px;
  height: 0;
  margin-left: -2px;
  background: #7a9e7e;
  animation: sandFall 0.5s ease-in-out;
}

@keyframes sandFall {
  0% { height: 0; }
  100% { height: 20px; }
}

.hg-text {
  font-family: 'VT323', 'Courier New', monospace;
  font-size: 18px;
  color: #7a9e7e;
  letter-spacing: 2px;
  animation: hgBlink 0.5s step-end infinite;
}

@keyframes hgBlink {
  50% { opacity: 0; }
}

/* Popup Window */
.window {
  position: absolute;
  width: 600px;
  height: 400px;
  background: #3a1e12;
  border: 3px solid #7a4e3a;
  box-shadow: 4px 4px 0 rgba(0,0,0,0.5), inset 0 0 0 2px #2a1208;
  display: flex;
  flex-direction: column;
  min-width: 300px;
  min-height: 200px;
  image-rendering: pixelated;
}

.window.maximized {
  width: 100% !important;
  height: calc(100vh - 40px) !important;
  top: 0 !important;
  left: 0 !important;
  transform: none !important;
}

.window-titlebar {
  display: flex;
  align-items: center;
  height: 32px;
  background: repeating-linear-gradient(
    45deg,
    #6b1d2f,
    #6b1d2f 4px,
    #8b3a4f 4px,
    #8b3a4f 8px
  );
  border-bottom: 2px solid #4a2a1e;
  flex-shrink: 0;
  padding: 0 4px;
  cursor: default;
}

.window-titlebar .win-btn {
  width: 22px;
  height: 22px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: #5c3828;
  border: 2px solid #7a4e3a;
  color: #d4c5a9;
  font-size: 12px;
  cursor: pointer;
  font-family: inherit;
  box-shadow: inset -1px -1px 0 #3a1e12;
  line-height: 1;
  flex-shrink: 0;
}

.window-titlebar .win-btn:hover {
  background: #7a4e3a;
}

.window-titlebar .win-btn:active {
  box-shadow: inset 1px 1px 0 #3a1e12;
}

/* Glitch close animation */
@keyframes glitchTear {
  0% { clip-path: inset(0 0 0 0); transform: translateX(0); }
  10% { clip-path: inset(20% 0 60% 0); transform: translateX(-4px); }
  20% { clip-path: inset(50% 0 10% 0); transform: translateX(3px); }
  30% { clip-path: inset(5% 0 70% 0); transform: translateX(-6px); }
  40% { clip-path: inset(60% 0 15% 0); transform: translateX(5px); }
  50% { clip-path: inset(10% 0 50% 0); transform: translateX(-3px); }
  60% { clip-path: inset(40% 0 30% 0); transform: translateX(4px); }
  70% { clip-path: inset(15% 0 65% 0); transform: translateX(-5px); }
  80% { clip-path: inset(55% 0 5% 0); transform: translateX(2px); }
  90% { clip-path: inset(25% 0 45% 0); transform: translateX(-2px); }
  100% { clip-path: inset(0 0 0 0); transform: translateX(0); opacity: 0; }
}

@keyframes glitchFlicker {
  0%, 100% { opacity: 1; }
  8% { opacity: 0.1; }
  10% { opacity: 1; }
  25% { opacity: 0.3; }
  27% { opacity: 1; }
  45% { opacity: 0.05; }
  47% { opacity: 1; }
  65% { opacity: 0.2; }
  67% { opacity: 1; }
  85% { opacity: 0.08; }
  87% { opacity: 1; }
}

.window.glitch {
  animation:
    glitchTear 0.5s ease-out forwards,
    glitchFlicker 0.5s ease-out forwards;
  box-shadow:
    4px 4px 0 rgba(0,0,0,0.5),
    inset 0 0 0 2px #2a1208,
    -6px 0 0 rgba(255, 0, 0, 0.4),
    6px 0 0 rgba(0, 0, 255, 0.4);
}

.window-titlebar .win-title {
  flex: 1;
  text-align: center;
  font-size: 16px;
  color: #d4c5a9;
  letter-spacing: 1px;
}

.window-titlebar .win-spacer {
  width: 22px;
  flex-shrink: 0;
}

.window-body {
  flex: 1;
  padding: 16px;
  overflow-y: auto;
  font-size: 16px;
  color: #d4c5a9;
  background: #2a1208;
}

/* Folder grid */
.folder-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
  gap: 16px;
  padding: 8px;
}

.folder-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  padding: 12px 8px;
  background: #3a1e12;
  border: 2px solid #5c3828;
  cursor: pointer;
  transition: border-color 0.15s;
}

.folder-item:hover {
  border-color: #7a9e7e;
}

.folder-item .folder-icon {
  width: 48px;
  height: 36px;
  background: #7a9e7e;
  border: 2px solid #5c3828;
  border-radius: 2px 2px 0 0;
  position: relative;
  box-shadow: inset -2px -2px 0 #4a6e5e;
}

.folder-item .folder-icon::before {
  content: '';
  position: absolute;
  top: -6px;
  left: -2px;
  width: 16px;
  height: 6px;
  background: #7a9e7e;
  border: 2px solid #5c3828;
  border-bottom: none;
  border-radius: 2px 2px 0 0;
}

.folder-item .folder-label {
  font-size: 12px;
  color: #d4c5a9;
  text-align: center;
  word-break: break-word;
}

/* About Me content */
.about-content p {
  margin-bottom: 12px;
  line-height: 1.5;
}

.about-content .highlight {
  color: #7a9e7e;
}

/* Professors list */
.prof-list {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.prof-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 8px 12px;
  background: #3a1e12;
  border: 1px solid #5c3828;
  cursor: pointer;
  transition: border-color 0.15s;
}

.prof-item:hover {
  border-color: #7a9e7e;
}

.prof-item .prof-icon {
  width: 32px;
  height: 32px;
  background: #8b5e3c;
  border: 2px solid #5c3828;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
}

.prof-item .prof-name {
  font-size: 16px;
  color: #d4c5a9;
}

/* Back button */
.back-btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 4px 12px;
  background: #5c3828;
  border: 2px solid #7a4e3a;
  color: #d4c5a9;
  cursor: pointer;
  font-family: inherit;
  font-size: 14px;
  margin-bottom: 12px;
}

.back-btn:hover {
  background: #7a4e3a;
}

/* Iframe for exercise content */
.exercise-frame {
  width: 100%;
  height: calc(100% - 40px);
  border: 1px solid #5c3828;
  background: #fff;
}
</style>

<body>
<div id="app">
  <div id="main">
    <canvas id="canvas-bg"></canvas>
    <div id="sidebar">
      <div class="sidebar-title">Menu</div>
      <div class="sidebar-item" data-window="about">
        <span class="icon">&#x1f464;</span>
        <span>About Me</span>
      </div>
      <div class="sidebar-item" data-window="exercises">
        <span class="icon">&#x1f4c1;</span>
        <span>Exercises</span>
      </div>
      <div class="sidebar-item" data-window="professors">
        <span class="icon">&#x1f393;</span>
        <span>Credits</span>
      </div>
    </div>
    <div id="desktop">
      <div id="bg-title">Moazzam Ali Shah</div>
    </div>
  </div>
  <div id="taskbar">
    <div id="taskbar-tabs"></div>
    <div id="marquee-wrap">
      <span id="marquee-text">Welcome to my portfolio  •  Benvenuti nel mio portfolio  •  <span dir="rtl">میرے پورٹ فولیو میں خوش آمدید</span></span>
    </div>
    <div id="clocks">
      <div class="clock">&#x1f1f5;&#x1f1f0; <span id="clock-pk">00:00:00</span></div>
      <div class="clock">&#x1f1ee;&#x1f1f9; <span id="clock-it">00:00:00</span></div>
    </div>
    <button id="crt-toggle">&#x25CF; CRT</button>
  </div>
</div>
<div id="crt-overlay"></div>
<div id="hourglass-overlay">
  <div class="hourglass-box">
    <div class="hourglass">
      <div class="hg-top"></div>
      <div class="hg-sand-stream"></div>
      <div class="hg-bottom"></div>
    </div>
    <div class="hg-text">Processing...</div>
  </div>
</div>
<script>
const canvas = document.getElementById('canvas-bg');
const ctx = canvas.getContext('2d');
const desktop = document.getElementById('desktop');
let zIndexCounter = 100;
const winState = {
  openWindows: {},
  activeWindow: null,
  lastMode: 'standard'
};

function resizeCanvas() {
  canvas.width = desktop.offsetWidth;
  canvas.height = desktop.offsetHeight;
  drawGrid();
}

function drawGrid() {
  const w = canvas.width;
  const h = canvas.height;
  const horizonY = h * 0.55;
  const vanishX = w / 2;
  const vanishY = horizonY;

  const sky = ctx.createLinearGradient(0, 0, 0, horizonY);
  sky.addColorStop(0, '#2a0a12');
  sky.addColorStop(0.5, '#4a1525');
  sky.addColorStop(1, '#6b1d2f');
  ctx.fillStyle = sky;
  ctx.fillRect(0, 0, w, horizonY);

  ctx.fillStyle = '#1a0a08';
  ctx.fillRect(0, horizonY, w, h - horizonY);

  const lineColors = ['#7a9e7e', '#d4c5a9', '#8b5e3c'];
  for (let i = 1; i <= 20; i++) {
    const t = i / 20;
    const y = horizonY + (h - horizonY) * t * t;
    ctx.strokeStyle = lineColors[i % 3];
    ctx.lineWidth = i < 3 ? 2 : 1;
    ctx.globalAlpha = 1 - t * 0.5;
    ctx.beginPath();
    ctx.moveTo(0, y);
    ctx.lineTo(w, y);
    ctx.stroke();
  }

  const numRays = 30;
  for (let i = 0; i < numRays; i++) {
    const angle = -Math.PI / 2 - 0.8 + (i / (numRays - 1)) * 1.6;
    const dx = Math.cos(angle);
    const dy = Math.sin(angle);
    if (dy <= 0) continue;
    const tMax = dy > 0 ? (h - vanishY) / dy : 0;
    const endX = vanishX + dx * tMax;
    const endY = vanishY + dy * tMax;
    ctx.strokeStyle = lineColors[i % 3];
    ctx.lineWidth = i % 5 === 0 ? 2 : 1;
    ctx.globalAlpha = 0.6;
    ctx.beginPath();
    ctx.moveTo(vanishX, vanishY);
    ctx.lineTo(endX, endY);
    ctx.stroke();
  }

  const grd = ctx.createRadialGradient(vanishX, vanishY, 0, vanishX, vanishY, 60);
  grd.addColorStop(0, 'rgba(212, 197, 169, 0.4)');
  grd.addColorStop(0.5, 'rgba(212, 197, 169, 0.1)');
  grd.addColorStop(1, 'rgba(212, 197, 169, 0)');
  ctx.fillStyle = grd;
  ctx.beginPath();
  ctx.arc(vanishX, vanishY, 60, 0, Math.PI * 2);
  ctx.fill();
  ctx.globalAlpha = 1;
}

window.addEventListener('resize', resizeCanvas);
resizeCanvas();

// Audio - 8-bit sound effects
let audioCtx = null;
function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

function playBlip() {
  const ctx = getAudioCtx();
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.type = 'square';
  osc.frequency.value = 1000;
  gain.gain.setValueAtTime(0.04, ctx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.06);
  osc.connect(gain).connect(ctx.destination);
  osc.start(ctx.currentTime);
  osc.stop(ctx.currentTime + 0.06);
}

function playChime() {
  const ctx = getAudioCtx();
  const notes = [523, 659, 784];
  notes.forEach((freq, i) => {
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = 'triangle';
    osc.frequency.value = freq;
    const t = ctx.currentTime + i * 0.1;
    gain.gain.setValueAtTime(0.07, t);
    gain.gain.exponentialRampToValueAtTime(0.001, t + 0.12);
    osc.connect(gain).connect(ctx.destination);
    osc.start(t);
    osc.stop(t + 0.12);
  });
}

function playZap() {
  const ctx = getAudioCtx();
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.type = 'sawtooth';
  osc.frequency.setValueAtTime(600, ctx.currentTime);
  osc.frequency.exponentialRampToValueAtTime(80, ctx.currentTime + 0.4);
  gain.gain.setValueAtTime(0.06, ctx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.4);
  osc.connect(gain).connect(ctx.destination);
  osc.start(ctx.currentTime);
  osc.stop(ctx.currentTime + 0.4);
}

// Clock update
function updateClocks() {
  const now = new Date();
  const pk = new Date(now.toLocaleString('en-US', { timeZone: 'Asia/Karachi' }));
  const it = new Date(now.toLocaleString('en-US', { timeZone: 'Europe/Rome' }));
  document.getElementById('clock-pk').textContent = pk.toLocaleTimeString('en-US', { hour12: false });
  document.getElementById('clock-it').textContent = it.toLocaleTimeString('en-US', { hour12: false });
}
setInterval(updateClocks, 1000);
updateClocks();

// Hourglass processing
const hgOverlay = document.getElementById('hourglass-overlay');

function showHourglass(callback) {
  hgOverlay.classList.add('on');
  const stream = document.querySelector('.hg-sand-stream');
  stream.style.animation = 'none';
  void stream.offsetWidth;
  stream.style.animation = 'sandFall 0.5s ease-in-out';
  setTimeout(() => {
    hgOverlay.classList.remove('on');
    callback();
  }, 500);
}

function createWindow(type, title) {
  if (winState.openWindows[type]) {
    if (winState.openWindows[type].state === 'minimized') {
      restoreWindow(type);
    } else {
      bringToFront(winState.openWindows[type].domElement);
    }
    return;
  }

  const win = document.createElement('div');
  win.className = 'window';
  win.dataset.type = type;
  win.style.zIndex = ++zIndexCounter;
  win.style.top = '50%';
  win.style.left = '50%';
  win.style.transform = 'translate(-50%, -50%)';

  win.innerHTML = `
    <div class="window-titlebar">
      <span class="win-title">${title}</span>
      <span class="win-btn win-maximize" title="Maximize">&#x25a1;</span>
      <span class="win-btn win-close" title="Close">&#x2715;</span>
    </div>
    <div class="window-body"></div>
  `;

  desktop.appendChild(win);

  const body = win.querySelector('.window-body');
  if (type === 'exercises') {
    buildExerciseGrid(body);
  } else {
    body.innerHTML = WINDOW_CONTENT[type] || '';
  }
  body.querySelectorAll('.prof-item').forEach(item => {
    item.addEventListener('mouseenter', playBlip);
  });

  win.querySelector('.win-close').addEventListener('click', () => {
    win.classList.add('glitch');
    playZap();
    setTimeout(() => {
      win.remove();
      delete winState.openWindows[type];
      if (winState.activeWindow === type) winState.activeWindow = null;
    }, 500);
  });

  win.querySelector('.win-maximize').addEventListener('click', () => {
    playBlip();
    win.classList.toggle('maximized');
    winState.lastMode = win.classList.contains('maximized') ? 'maximized' : 'standard';
    if (win.classList.contains('maximized')) {
      win.style.top = '0';
      win.style.left = '0';
      win.style.transform = 'none';
    } else {
      win.style.top = '50%';
      win.style.left = '50%';
      win.style.transform = 'translate(-50%, -50%)';
    }
  });

  win.addEventListener('mousedown', () => bringToFront(win));

  winState.openWindows[type] = { type, title, domElement: win, state: 'open', tabElement: null };
  winState.activeWindow = type;
  if (winState.lastMode === 'maximized') {
    win.classList.add('maximized');
    win.style.top = '0';
    win.style.left = '0';
    win.style.transform = 'none';
  }
  bringToFront(win);
}

function bringToFront(win) {
  win.style.zIndex = ++zIndexCounter;
}

function minimizeWindow(type) {
  const entry = winState.openWindows[type];
  if (!entry || entry.state !== 'open') return;

  const win = entry.domElement;

  win.classList.add('minimizing');
  if (winState.activeWindow === type) winState.activeWindow = null;

  setTimeout(() => {
    win.style.display = 'none';
    win.classList.remove('minimizing');
    entry.state = 'minimized';

    const tab = document.createElement('div');
    tab.className = 'taskbar-tab';
    tab.innerHTML = `<span>${entry.title}</span><span class="tab-close">&#x2715;</span>`;

    tab.addEventListener('click', (e) => {
      if (e.target.classList.contains('tab-close')) return;
      restoreWindow(type);
    });

    tab.querySelector('.tab-close').addEventListener('click', (e) => {
      e.stopPropagation();
      tab.classList.add('glitch');
      playZap();
      setTimeout(() => {
        win.remove();
        tab.remove();
        delete winState.openWindows[type];
        if (winState.activeWindow === type) winState.activeWindow = null;
      }, 500);
    });

    document.getElementById('taskbar-tabs').appendChild(tab);
    entry.tabElement = tab;
  }, 300);
}

function restoreWindow(type) {
  const entry = winState.openWindows[type];
  if (!entry || entry.state !== 'minimized') return;

  if (winState.activeWindow && winState.activeWindow !== type) {
    minimizeWindow(winState.activeWindow);
  }

  if (entry.tabElement) {
    entry.tabElement.remove();
    entry.tabElement = null;
  }

  const win = entry.domElement;
  win.style.display = '';
  bringToFront(win);
  win.classList.add('restoring');

  setTimeout(() => {
    win.classList.remove('restoring');
    entry.state = 'open';
    winState.activeWindow = type;
    playChime();
  }, 300);
}

const EXERCISES = [
  { label: 'Animation', path: 'Animation/index.html' },
  { label: 'Pattern', path: 'Pattern/index.html' },
  { label: 'Tic Tac Toe', path: 'Tic Tac toe/index.html' },
  { label: 'Hand Gesture', path: 'Hand Gesture/index.html' },
  { label: 'Basmati', path: 'Basmati/Code Base/index.html' }
];

function buildExerciseGrid(container) {
  container.innerHTML = '';
  const grid = document.createElement('div');
  grid.className = 'folder-grid';
  EXERCISES.forEach(ex => {
    const item = document.createElement('div');
    item.className = 'folder-item';
    item.innerHTML = `
      <div class="folder-icon"></div>
      <div class="folder-label">${ex.label}</div>
    `;
    item.addEventListener('click', () => openExercise(container, ex));
    item.addEventListener('mouseenter', playBlip);
    grid.appendChild(item);
  });
  container.appendChild(grid);
}

function openExercise(container, ex) {
  playBlip();
  container.innerHTML = `
    <button class="back-btn" onclick="buildExerciseGrid(this.parentElement)">&#x2190; Back</button>
    <iframe class="exercise-frame" src="${ex.path}" title="${ex.label}"></iframe>
  `;
}

// Sidebar handlers
document.querySelectorAll('.sidebar-item').forEach(item => {
  item.addEventListener('mouseenter', playBlip);
  item.addEventListener('click', () => {
    const type = item.dataset.window;
    const titles = { about: 'About Me', exercises: 'Exercises', professors: 'Credits' };

    if (winState.openWindows[type]?.state === 'open') {
      bringToFront(winState.openWindows[type].domElement);
      return;
    }

    if (winState.openWindows[type]?.state === 'minimized') {
      restoreWindow(type);
      return;
    }

    if (winState.activeWindow) {
      const activeWin = winState.openWindows[winState.activeWindow]?.domElement;
      winState.lastMode = activeWin?.classList.contains('maximized') ? 'maximized' : 'standard';
      minimizeWindow(winState.activeWindow);
    } else {
      winState.lastMode = 'standard';
    }

    showHourglass(() => {
      createWindow(type, titles[type]);
      playChime();
    });
  });
});

// Desktop background click — minimize active window
desktop.addEventListener('click', (e) => {
  if (e.target === desktop || e.target.id === 'bg-title' || e.target.tagName === 'CANVAS') {
    if (winState.activeWindow) {
      minimizeWindow(winState.activeWindow);
    }
  }
});

});
