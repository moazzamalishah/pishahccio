<script>
const audio = {
  ctx: null,
  analyser: null,
  dataArray: null,
  smoothVal: 0,
  smoothing: 0.3,
  rms: function() {
    if (!this.analyser || !this.dataArray) return 0;
    this.analyser.getByteTimeDomainData(this.dataArray);
    let sum = 0;
    const len = this.dataArray.length;
    for (let i = 0; i < len; i++) {
      const val = this.dataArray[i] / 128 - 1;
      sum += val * val;
    }
    const raw = Math.sqrt(sum / len);
    this.smoothVal += (raw - this.smoothVal) * this.smoothing;
    return this.smoothVal;
  }
};

async function initAudio() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    audio.ctx = new (window.AudioContext || window.webkitAudioContext)();
    const source = audio.ctx.createMediaStreamSource(stream);
    audio.analyser = audio.ctx.createAnalyser();
    audio.analyser.fftSize = 256;
    source.connect(audio.analyser);
    audio.dataArray = new Uint8Array(audio.analyser.frequencyBinCount);
    hint.textContent = 'Mic active! Speak to animate';
    setTimeout(() => {
      hint.style.opacity = '0';
      setTimeout(() => hint.remove(), 500);
    }, 3000);
  } catch (e) {
    console.warn('Audio setup failed:', e);
  }
}

function resumeAudio() {
  if (audio.ctx && audio.ctx.state === 'suspended') {
    audio.ctx.resume();
  }
}

document.addEventListener('click', resumeAudio, { once: true });
document.addEventListener('touchstart', resumeAudio, { once: true });
document.addEventListener('keydown', resumeAudio, { once: true });

const hint = document.createElement('div');
hint.textContent = 'Speak to start the animation';
hint.setAttribute('role', 'status');
Object.assign(hint.style, {
  position: 'fixed', bottom: '20px', left: '50%', transform: 'translateX(-50%)',
  background: 'rgba(0,0,0,0.7)', color: '#fff', padding: '10px 20px',
  borderRadius: '8px', fontFamily: 'sans-serif', fontSize: '14px',
  zIndex: '999', pointerEvents: 'none', transition: 'opacity 0.5s'
});
document.body.appendChild(hint);

initAudio();

const els = {
  air: document.querySelector('#Air'),
  towel: document.querySelector('#Towel'),
  napkin: document.querySelector('#Napkin'),
  hair: document.querySelector('#Hair'),
};

const airPaths = els.air ? Array.from(els.air.querySelectorAll('path')) : [];

function samplePoints(container, count) {
  if (!container) return [];
  const r = [];
  if (container.tagName === 'path') {
    const d = container.getAttribute('d');
    const len = container.getTotalLength();
    if (len && len >= 2) {
      const pts = [];
      for (let i = 0; i <= count; i++) pts.push(container.getPointAtLength((i / count) * len));
      r.push({ el: container, origD: d, pts });
    } else {
      r.push({ el: container, origD: d, pts: null });
    }
  } else {
    container.querySelectorAll('path').forEach(p => {
      const d = p.getAttribute('d');
      const len = p.getTotalLength();
      if (!len || len < 2) { r.push({ el: p, origD: d, pts: null }); return; }
      const pts = [];
      for (let i = 0; i <= count; i++) pts.push(p.getPointAtLength((i / count) * len));
      r.push({ el: p, origD: d, pts });
    });
  }
  return r;
}

function buildPath(pts) {
  let d = `M ${pts[0].x},${pts[0].y}`;
  for (let i = 1; i < pts.length; i++) d += ` L ${pts[i].x},${pts[i].y}`;
  return d + ' Z';
}

const towelPts = samplePoints(els.towel, 120);
const napkinPts = samplePoints(els.napkin, 120);
const hairPts = samplePoints(els.hair, 120);

function swingAround(data, intensity, time, aIdx, aCount, amp) {
  data.forEach(d => {
    if (!d.pts) return;
    const n = d.pts.length - 1;
    let ax = 0, ay = 0;
    for (let i = 0; i < aCount; i++) { ax += d.pts[(aIdx === 'start' ? i : n - i)].x; ay += d.pts[(aIdx === 'start' ? i : n - i)].y; }
    ax /= aCount; ay /= aCount;
    const def = d.pts.map((pt, i) => {
      const t = i / n;
      let w = 0;
      if (aIdx === 'start') w = Math.max(0, (t * n - aCount) / (n - aCount));
      else w = Math.max(0, ((n - t * n) - aCount) / (n - aCount));
      w = w * w;
      const angle = w * intensity * amp * Math.sin(time * 2.5 + i * 0.15);
      const cos = Math.cos(angle), sin = Math.sin(angle);
      const dx = pt.x - ax, dy = pt.y - ay;
      return { x: ax + dx * cos - dy * sin, y: ay + dx * sin + dy * cos };
    });
    d.el.setAttribute('d', buildPath(def));
  });
}

function swingBothEnds(data, intensity, time, aCount, amp) {
  data.forEach(d => {
    if (!d.pts) return;
    const n = d.pts.length - 1;
    let axStart = 0, ayStart = 0, axEnd = 0, ayEnd = 0;
    for (let i = 0; i < aCount; i++) { axStart += d.pts[i].x; ayStart += d.pts[i].y; axEnd += d.pts[n - i].x; ayEnd += d.pts[n - i].y; }
    axStart /= aCount; ayStart /= aCount; axEnd /= aCount; ayEnd /= aCount;
    const def = d.pts.map((pt, i) => {
      const t = i / n;
      const wStart = Math.max(0, (t * n - aCount) / (n - aCount));
      const wEnd = Math.max(0, ((n - t * n) - aCount) / (n - aCount));
      const w = Math.min(wStart, wEnd);
      const aw = w * w * intensity * amp;
      const angle = aw * Math.sin(time * 3 + t * 4);
      const cx = axStart + (axEnd - axStart) * t, cy = ayStart + (ayEnd - ayStart) * t;
      const cos = Math.cos(angle), sin = Math.sin(angle);
      const dx = pt.x - cx, dy = pt.y - cy;
      return { x: cx + dx * cos - dy * sin, y: cy + dy * sin + dy * cos };
    });
    d.el.setAttribute('d', buildPath(def));
  });
}

function swingHair(data, intensity, time) {
  data.forEach(d => {
    if (!d.pts) return;
    const n = d.pts.length - 1;
    let minY = Infinity, maxY = -Infinity;
    d.pts.forEach(pt => { if (pt.y < minY) minY = pt.y; if (pt.y > maxY) maxY = pt.y; });
    const yMid = (minY + maxY) / 2;
    let ax = 0, ay = 0, aCount = 0;
    d.pts.forEach(pt => { if (pt.y < yMid) { ax += pt.x; ay += pt.y; aCount++; } });
    if (!aCount) return;
    ax /= aCount; ay /= aCount;
    const def = d.pts.map((pt, i) => {
      const yN = Math.max(0, Math.min((pt.y - yMid) / ((maxY - minY) * 0.5), 1));
      const w = yN * yN;
      const angle = w * intensity * 0.2 * Math.sin(time * 1.8 + i * 0.1);
      const cos = Math.cos(angle), sin = Math.sin(angle);
      const dx = pt.x - ax, dy = pt.y - ay;
      return { x: ax + dx * cos - dy * sin, y: ay + dy * sin + dy * cos };
    });
    d.el.setAttribute('d', buildPath(def));
  });
}

function swingHang(data, intensity, time, aCount, amp, topFraction) {
  data.forEach(d => {
    if (!d.pts) return;
    const n = d.pts.length - 1;
    let ax = 0, ay = 0;
    for (let i = 0; i < aCount; i++) { ax += d.pts[i].x; ay += d.pts[i].y; }
    ax /= aCount; ay /= aCount;
    let minY = Infinity, maxY = -Infinity;
    d.pts.forEach(pt => { if (pt.y < minY) minY = pt.y; if (pt.y > maxY) maxY = pt.y; });
    const yThreshold = minY + (maxY - minY) * topFraction;
    const range = maxY - yThreshold || 1;
    const def = d.pts.map((pt, i) => {
      if (pt.y <= yThreshold) return { x: pt.x, y: pt.y };
      const yN = Math.min((pt.y - yThreshold) / range, 1);
      const w = yN * yN * intensity * amp;
      const angle = w * Math.sin(time * 2.5 + i * 0.15);
      const cos = Math.cos(angle), sin = Math.sin(angle);
      const dx = pt.x - ax, dy = pt.y - ay;
      return { x: ax + dx * cos - dy * sin, y: ay + dx * sin + dy * cos };
    });
    d.el.setAttribute('d', buildPath(def));
  });
}

let time = 0;
let windTimer = 0;
let windIntensity = 0;
let windTarget = 0;
let speedMult = 1;
const WIND_DURATION = 4;
const THRESHOLD_NORMAL = 0.04;
const THRESHOLD_INTENSE = 0.10;

function animate(now) {
  requestAnimationFrame(animate);
  const dt = Math.min((now - (animate._last || now)) / 1000, 0.05);
  animate._last = now;
  time += dt;

  if (audio && audio.ctx && audio.ctx.state === 'suspended') {
    audio.ctx.resume();
  }

  const level = audio && audio.ctx ? audio.rms() : 0;

  let newTarget = 0;
  if (level > THRESHOLD_INTENSE) {
    newTarget = 1.0;
  } else if (level > THRESHOLD_NORMAL) {
    newTarget = 0.5;
  }

  if (newTarget > 0) {
    windTimer = WIND_DURATION;
    if (newTarget >= windTarget) { windTarget = newTarget; speedMult = newTarget >= 1 ? 2 : 1; }
  }

  if (windTimer > 0) {
    windTimer -= dt;
    windIntensity += (windTarget - windIntensity) * Math.min(dt * 3, 1);
  } else {
    windIntensity *= Math.pow(0.95, dt * 60);
    if (windIntensity < 0.001) { windIntensity = 0; windTarget = 0; speedMult = 1; }
  }

  const i = Math.max(0, windIntensity);
  const st = time * speedMult;

  if (els.air && airPaths.length) {
    const airOpacity = Math.min(i * 1.5, 0.8);
    els.air.style.opacity = airOpacity;
    airPaths.forEach((path, idx) => {
      const phase = idx * 1.7;
      const dx = -i * 25 * Math.abs(Math.sin(st * 2 + phase));
      const rot = i * 12 * Math.sin(st * 3 + phase);
      const dy = i * 8 * Math.sin(st * 4 + phase + 1);
      path.style.transform = `translateX(${dx}px) rotate(${rot}deg) translateY(${dy}px)`;
      path.style.transformOrigin = 'center center';
    });
  }

  swingHang(towelPts, i, st, 6, 0.12, 0.25);
  swingAround(napkinPts, i, st, 'start', 6, 0.12);
  swingHair(hairPts, i, st);
}

requestAnimationFrame(animate);
</script>
